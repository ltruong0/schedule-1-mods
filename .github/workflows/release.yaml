name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Download reference assemblies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download assemblies -R ${{ github.repository }} -D /tmp/assemblies
          tar xzf /tmp/assemblies/assemblies.tar.gz -C .

      - name: Build all mods
        run: |
          mkdir -p artifacts
          for csproj in *//*.csproj; do
            mod=$(basename "${csproj%.csproj}")
            echo "Building $mod..."
            dotnet build "$csproj" -c Release

            dll="$(dirname "$csproj")/bin/Release/net6.0/$mod.dll"
            if [ -f "$dll" ]; then
              # Extract version from MelonInfo attribute in source
              version=$(grep -oP 'MelonInfo\(.*?,\s*".*?",\s*"\K[^"]+' "$(dirname "$csproj")"/*.cs 2>/dev/null || echo "unknown")
              cp "$dll" "artifacts/${mod}_v${version}.dll"
              echo "  -> ${mod}_v${version}.dll"
            fi
          done

      - name: Create zip per mod
        run: |
          cd artifacts
          for dll in *.dll; do
            mod="${dll%.dll}"
            zip "${mod}.zip" "$dll"
            rm "$dll"
          done
          ls -la

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
